<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administración - LogisTFG</title>
    <link rel="icon" type="image/ico" href="../img/icono.ico" sizes="64x64">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilo.css">
    
    <style>
        /* Estilo rápido para centrar el login perfectamente */
        body, html { height: 100%; background-color: #2c3e50; }
        .login-container { display: flex; align-items: center; justify-content: center; height: 100%; }
    </style>
</head>
<body>

    <div class="container login-container">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg border-0 rounded-lg">
                <div class="card-header bg-dark text-white text-center py-4">
                    <h3 class="font-weight-light my-2">⚙️ Panel Admin</h3>
                    <p class="small mb-0">LogisTFG - Solo Personal Autorizado</p>
                </div>
                <div class="card-body p-4">
                    <form action="index.html" method="GET">
                        <div class="mb-3">
                            <label class="small mb-1" for="admin_user">Usuario</label>
                            <input class="form-control" id="admin_user" type="text" required placeholder="Introduce tu usuario" />
                        </div>
                        <div class="mb-4">
                            <label class="small mb-1" for="admin_pass">Contraseña</label>
                            <input class="form-control" id="admin_pass" type="password" required placeholder="Introduce tu contraseña" />
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" type="submit">Entrar a mantenimiento</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center py-3">
                    <div class="small"><a href="../index.html" class="text-muted">← Volver a la web pública</a></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
