<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasarela de Pago - LogisTFG</title>
    <link rel="icon" type="image/ico" href="img/icono.ico" sizes="64x64">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body class="bg-light">

    <mi-cabecera></mi-cabecera>
    <mi-menu></mi-menu>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-success text-white text-center py-3">
                        <h4 class="mb-0">💳 Formalizar Reserva Logística</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <div class="alert alert-info mb-4">
                            <strong>Total a pagar:</strong> <span class="fs-4">17.90 €</span>
                        </div>

                        <form action="mi_cuenta.html" method="GET" id="formCheckout">
                            
                            <h5 class="mb-3">Método de Pago</h5>
                            
                            <div class="mb-3">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="metodo_pago" id="tarjeta" value="tarjeta" checked>
                                    <label class="form-check-label" for="tarjeta">Tarjeta de Crédito/Débito</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="metodo_pago" id="paypal" value="paypal">
                                    <label class="form-check-label" for="paypal">PayPal</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="metodo_pago" id="transferencia" value="transferencia">
                                    <label class="form-check-label" for="transferencia">Transferencia Bancaria</label>
                                </div>
                            </div>

                            <hr>

                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label for="titular" class="form-label">Titular de la tarjeta</label>
                                    <input type="text" class="form-control" id="titular" required placeholder="Nombre como aparece en la tarjeta">
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label for="num_tarjeta" class="form-label">Número de tarjeta</label>
                                    <input type="text" class="form-control" id="num_tarjeta" pattern="[0-9]{16}" title="Debe contener 16 dígitos numéricos sin espacios" required placeholder="1234567812345678">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="caducidad" class="form-label">Fecha de Caducidad</label>
                                    <input type="month" class="form-control" id="caducidad" required>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label for="cvv" class="form-label">CVV</label>
                                    <input type="text" class="form-control" id="cvv" pattern="[0-9]{3,4}" title="Código de seguridad de 3 o 4 dígitos" required placeholder="123">
                                </div>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="carrito.html" class="btn btn-outline-secondary">Volver al carrito</a>
                                <button type="submit" class="btn btn-success btn-lg">Pagar y Confirmar Pedido 🔒</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <mi-pie></mi-pie>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/mis-etiquetas.js"></script>
    <script src="./js/logica.js"></script>
</body>
</html>
